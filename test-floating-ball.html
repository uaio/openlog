<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>悬浮球测试</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      background: white;
      border-radius: 8px;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 { color: #333; }
    .instruction {
      background: #f0f0f0;
      padding: 15px;
      border-radius: 4px;
      margin: 10px 0;
    }
    .instruction h3 { margin-top: 0; }
    .vconsole-panel {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: white;
      z-index: 99998;
      display: none;
      padding: 20px;
      overflow-y: auto;
    }
    .vconsole-panel.show {
      display: block;
    }
    .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 10px 20px;
      background: #ff4d4f;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>悬浮球功能测试</h1>

    <div class="instruction">
      <h3>✅ 功能清单</h3>
      <ul>
        <li>点击悬浮球：显示/隐藏面板</li>
        <li>拖动悬浮球：随意移动</li>
        <li>靠近边缘：自动吸附（显示半个球，半透明）</li>
        <li>吸附后连击 3 次：恢复完整显示（500ms 内）</li>
        <li>拖动中：不透明 + 阴影放大</li>
      </ul>
    </div>

    <div class="instruction">
      <h3>🧪 测试步骤</h3>
      <ol>
        <li>点击悬浮球，验证面板显示/隐藏</li>
        <li>拖动悬浮球到屏幕中央，松开</li>
        <li>拖动悬浮球到屏幕边缘，验证自动吸附</li>
        <li>在吸附状态下，单击验证无效</li>
        <li>在吸附状态下，快速连击 3 次，验证恢复</li>
        <li>测试四条边的吸附效果</li>
      </ol>
    </div>
  </div>

  <div class="vconsole-panel" id="panel">
    <button class="close-btn" id="closeBtn">关闭</button>
    <h2>VConsole 面板</h2>
    <p>这是模拟的 vconsole 调试面板。</p>
    <div id="logs"></div>
  </div>

  <script type="module">
    // 导入路径相对于项目根目录
    import { FloatingBall } from './packages/vconsole/dist/index.js';

    const panel = document.getElementById('panel');
    const logs = document.getElementById('logs');
    const closeBtn = document.getElementById('closeBtn');
    let isPanelShown = false;

    // 将函数暴露到全局作用域
    window.togglePanel = function() {
      isPanelShown = !isPanelShown;
      panel.classList.toggle('show', isPanelShown);

      if (isPanelShown) {
        addLog('面板已打开');
      } else {
        addLog('面板已关闭');
      }
    };

    // 绑定关闭按钮
    closeBtn.addEventListener('click', window.togglePanel);

    function addLog(message) {
      const time = new Date().toLocaleTimeString();
      logs.innerHTML = `<div>[${time}] ${message}</div>` + logs.innerHTML;
    }

    // 创建悬浮球
    const ball = new FloatingBall({
      onActivate: () => {
        addLog('悬浮球被激活');
        window.togglePanel();
      }
    });

    ball.mount();
    addLog('悬浮球已创建');
  </script>
</body>
</html>
